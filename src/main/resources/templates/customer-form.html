<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規顧客登録</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>新規顧客登録</h1>

<form th:action="${customer.id} ? @{/customers/{id}/update(id=${customer.id})} : @{/customers}"
      th:object="${customer}" method="post">

    <input type="hidden" th:field="*{id}" />

    <div>
        <label>名前：</label>
        <input type="text" th:field="*{name}" />
    </div>

    <div>
        <label>用件：</label>
        <input type="text" th:field="*{todo}" />
    </div>

    <div>
        <label>メールアドレス：</label>
        <input type="email" th:field="*{email}" />
    </div>

    <div>
        <label>電話番号：</label>
        <input type="text" th:field="*{phone}" />
    </div>

    <button type="submit" class="btn">登録する</button>
</form>

<br>
<a href="/customers" class="btn">一覧に戻る</a>
</body>
</html>
