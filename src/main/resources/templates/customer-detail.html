<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <title>顧客詳細</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>顧客詳細情報</h1>

<table>
  <tr>
    <th>ID</th>
    <td th:text="${customer.id}"></td>
  </tr>
  <tr>
    <th>名前</th>
    <td th:text="${customer.name}"></td>
  </tr>
  <tr>
    <th>メールアドレス</th>
    <td th:text="${customer.email}"></td>
  </tr>
  <tr>
    <th>用件（Todo）</th>
    <td th:text="${customer.todo}"></td>
  </tr>
  <tr>
    <th>電話番号</th>
    <td th:text="${customer.phone}"></td>
  </tr>
</table>

<br>
<div style="display: flex; gap: 10px;">
  <a href="/customers" class="btn" style="background-color: #6c757d;">一覧に戻る</a>
</div>
</body>
</html>
<div style="display: flex; gap: 10px; margin-top: 20px;">
  <a href="/customers" class="btn" style="background-color: #6c757d;">一覧に戻る</a>

  <form th:action="@{/customers/{id}/delete(id=${customer.id})}" method="post"
        onsubmit="return confirm('本当に削除してもよろしいですか？');">
    <button type="submit" class="btn" style="background-color: #dc3545;">削除する</button>
  </form>
</div>
